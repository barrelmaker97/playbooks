---
ansible_user: barrelmaker
cert_expiration_seconds: 2592000  # 30 days
cluster_host: poseidon
cluster_port: 6443
cluster_user: barrelmaker
cluster_vip: 192.168.15.40
external_domain: barrelmaker.dev
install_disk: /dev/nvme0n1
interface_name: enp86s0
local_domain: lan
nas_host: soteria
node_names:
  - node1-poseidon
  - node2-poseidon
  - node3-poseidon
# etcd Prometheus scrape targets. Kubernetes Endpoints objects require literal
# IPs (hostnames are rejected), so these must be kept in sync with the nodes.
node_ips:
  - 192.168.15.41
  - 192.168.15.42
  - 192.168.15.43
ntp_server: 192.168.15.1
talos_config_dir: /home/barrelmaker/.talos
talos_version: "1.13.3"
workload_namespace: barrelmaker

# NUT connection
nut_host: ups@192.168.15.30
nut_user: remoteuser
nut_password: hunter2

# Service versions
cert_manager_version: "1.20.2"
trust_manager_version: "0.22.1"
ingress_nginx_version: "4.15.1"
metrics_server_version: "3.13.0"
metallb_version: "0.16.1"
prometheus_crds_version: "28.0.0"
kube_prometheus_stack_version: "82.13.0"
longhorn_version: "1.11.2"
loki_version: "6.53.0"
tempo_version: "1.26.5"
otel_collector_version: "0.145.0"

# Service configuration
email_address: nolancooper97@gmail.com
metallb_ip_range: 192.168.15.60-192.168.15.69

# Longhorn configuration
# Hard cap on snapshots per volume (backpressure: blocks new snapshots once
# reached). The critical snapshot alert fires just below this value.
longhorn_snapshot_max_count: 50

# Templated variables
cluster_domain: "{{ cluster_host }}.{{ local_domain }}"
nas_domain: "{{ nas_host }}.{{ local_domain }}"
