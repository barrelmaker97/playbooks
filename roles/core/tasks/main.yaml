---
- name: Set core role path
  ansible.builtin.set_fact:
    core_role_path: "{{ role_path }}"

- name: Setup Helm
  ansible.builtin.include_role:
    name: helm
    tasks_from: setup
  vars:
    helm_repos:
      grafana: https://grafana.github.io/helm-charts
      grafana-community: https://grafana-community.github.io/helm-charts
      ingress-nginx: https://kubernetes.github.io/ingress-nginx
      jetstack: https://charts.jetstack.io
      longhorn: https://charts.longhorn.io
      metallb: https://metallb.github.io/metallb
      metrics-server: https://kubernetes-sigs.github.io/metrics-server
      open-telemetry: https://open-telemetry.github.io/opentelemetry-helm-charts
      prometheus-community: https://prometheus-community.github.io/helm-charts

- name: Deploy Prometheus CRDs
  ansible.builtin.include_role:
    name: helm
    tasks_from: deploy
  vars:
    helm_chart_name: prometheus-operator-crds
    helm_chart_ref: prometheus-community/prometheus-operator-crds
    helm_chart_version: "{{ prometheus_crds_version }}"
    helm_chart_namespace: monitoring

- name: Create Longhorn Namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: longhorn-system
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged

- name: Deploy Longhorn
  ansible.builtin.include_role:
    name: helm
    tasks_from: deploy
  vars:
    helm_chart_name: longhorn
    helm_chart_ref: longhorn/longhorn
    helm_chart_version: "{{ longhorn_version }}"
    helm_chart_namespace: longhorn-system
    helm_chart_values_template: "{{ core_role_path }}/templates/values/longhorn.yaml.j2"

- name: Create Longhorn Local Storage Class
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: longhorn-local
      provisioner: driver.longhorn.io
      allowVolumeExpansion: true
      reclaimPolicy: Retain
      volumeBindingMode: Immediate
      parameters:
        dataEngine: v1
        dataLocality: strict-local
        numberOfReplicas: "1"
        disableRevisionCounter: "true"
        fsType: ext4

- name: Create Default Recurring Snapshot
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: longhorn.io/v1beta2
      kind: RecurringJob
      metadata:
        name: default-snapshotter
        namespace: longhorn-system
      spec:
        concurrency: 1
        cron: 0 * * * ?
        groups:
          - default
        labels: {}
        name: default-snapshotter
        parameters: {}
        retain: 24
        task: snapshot

- name: Create Default Recurring Backup
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: longhorn.io/v1beta2
      kind: RecurringJob
      metadata:
        name: default-backup
        namespace: longhorn-system
      spec:
        concurrency: 1
        cron: 0 12 * * ?
        groups:
          - default
        labels: {}
        name: default-backup
        parameters:
          full-backup-interval: "15"
        retain: 30
        task: backup

- name: Create MetalLB Namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: metallb-system
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged

- name: Deploy MetalLB
  ansible.builtin.include_role:
    name: helm
    tasks_from: deploy
  vars:
    helm_chart_name: metallb
    helm_chart_ref: metallb/metallb
    helm_chart_version: "{{ metallb_version }}"
    helm_chart_namespace: metallb-system
    helm_chart_values_template: "{{ core_role_path }}/templates/values/metallb.yaml.j2"

- name: Create IP Address Pool
  kubernetes.core.k8s:
    state: present
    template: ipaddresspool-metallb.yaml

- name: Advertise Load Balanced IP
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('file', 'files/L2Advertisement-metallb.yaml') | from_yaml }}"

- name: Deploy Ingress Nginx
  ansible.builtin.include_role:
    name: helm
    tasks_from: deploy
  vars:
    helm_chart_name: ingress-nginx
    helm_chart_ref: ingress-nginx/ingress-nginx
    helm_chart_version: "{{ ingress_nginx_version }}"
    helm_chart_namespace: ingress-nginx
    helm_chart_values_template: "{{ core_role_path }}/templates/values/ingress-nginx.yaml.j2"

- name: Set Nginx Ingress Controller Custom Headers
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('file', 'files/configmap-custom-headers.yaml') | from_yaml }}"

- name: Set Nginx Ingress Controller Config
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: ingress-nginx-controller
        namespace: ingress-nginx
      data:
        add-headers: "ingress-nginx/custom-headers"
        annotation-value-word-blocklist: "load_module,lua_package,_by_lua,location,root,proxy_pass,serviceaccount,{,}"
        enable-brotli: "true"
        hsts-max-age: "63072000"
        hsts-preload: "true"
        ssl-reject-handshake: "true"
        ssl-session-cache: "true"
        ssl-session-cache-size: "10m"
        ssl-session-tickets: "true"

- name: Deploy Cert Manager
  ansible.builtin.include_role:
    name: helm
    tasks_from: deploy
  vars:
    helm_chart_name: cert-manager
    helm_chart_ref: jetstack/cert-manager
    helm_chart_version: "{{ cert_manager_version }}"
    helm_chart_namespace: cert-manager
    helm_chart_values_template: "{{ core_role_path }}/templates/values/cert-manager.yaml.j2"

- name: Deploy Trust Manager
  ansible.builtin.include_role:
    name: helm
    tasks_from: deploy
  vars:
    helm_chart_name: trust-manager
    helm_chart_ref: jetstack/trust-manager
    helm_chart_version: "{{ trust_manager_version }}"
    helm_chart_namespace: cert-manager
    helm_chart_values_template: "{{ core_role_path }}/templates/values/trust-manager.yaml.j2"

- name: Create Internal Self-Signed Issuer
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: selfsigned-issuer
      spec:
        selfSigned: {}

- name: Create Internal Root CA Certificate
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: internal-root-ca
        namespace: cert-manager
      spec:
        isCA: true
        commonName: "internal-root-ca"
        duration: 8760h  # 1 year
        renewBefore: 720h  # 30 days
        secretName: internal-root-ca-secret
        privateKey:
          algorithm: ECDSA
          size: 256
        issuerRef:
          name: selfsigned-issuer
          kind: ClusterIssuer
          group: cert-manager.io

- name: Create Internal CA Issuer
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: internal-ca
      spec:
        ca:
          secretName: internal-root-ca-secret

- name: Create Trust Bundle
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: trust.cert-manager.io/v1alpha1
      kind: Bundle
      metadata:
        name: internal-trust
      spec:
        sources:
          - secret:
              name: internal-root-ca-secret
              key: ca.crt
        target:
          configMap:
            key: ca-certificates.crt

- name: Create Production Issuer
  kubernetes.core.k8s:
    state: present
    template: issuer-prod.yaml

- name: Create Staging Issuer
  kubernetes.core.k8s:
    state: present
    template: issuer-staging.yaml

- name: Create Monitoring Namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: monitoring
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged

- name: Create Grafana Admin Credentials Secret
  kubernetes.core.k8s:
    state: present
    namespace: monitoring
    definition: "{{ lookup('community.sops.sops', 'files/secret-grafana-admin-credentials.sops.yaml') | from_yaml }}"

- name: Create Additional Prometheus Scrape Config Secret
  kubernetes.core.k8s:
    state: present
    namespace: monitoring
    definition: "{{ lookup('file', 'files/secret-additional-scrape-config.yaml') | from_yaml }}"

- name: Create Dashboards ConfigMap
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('file', 'files/configmap-dashboards.yaml') | from_yaml }}"

- name: Deploy Loki
  ansible.builtin.include_role:
    name: helm
    tasks_from: deploy
  vars:
    helm_chart_name: loki
    helm_chart_ref: grafana/loki
    helm_chart_version: "{{ loki_version }}"
    helm_chart_namespace: monitoring
    helm_chart_values_template: "{{ core_role_path }}/templates/values/loki.yaml.j2"

- name: Deploy Tempo
  ansible.builtin.include_role:
    name: helm
    tasks_from: deploy
  vars:
    helm_chart_name: tempo
    helm_chart_ref: grafana-community/tempo
    helm_chart_version: "{{ tempo_version }}"
    helm_chart_namespace: monitoring
    helm_chart_values_template: "{{ core_role_path }}/templates/values/tempo.yaml.j2"

- name: Deploy OTel Collector
  ansible.builtin.include_role:
    name: helm
    tasks_from: deploy
  vars:
    helm_chart_name: otel-collector
    helm_chart_ref: open-telemetry/opentelemetry-collector
    helm_chart_version: "{{ otel_collector_version }}"
    helm_chart_namespace: monitoring
    helm_chart_values_template: "{{ core_role_path }}/templates/values/otel-collector.yaml.j2"

- name: Deploy Prometheus Stack
  ansible.builtin.include_role:
    name: helm
    tasks_from: deploy
  vars:
    helm_chart_name: kube-prometheus-stack
    helm_chart_ref: prometheus-community/kube-prometheus-stack
    helm_chart_version: "{{ kube_prometheus_stack_version }}"
    helm_chart_namespace: monitoring
    helm_chart_values_template: "{{ core_role_path }}/templates/values/kube-prometheus-stack.yaml.j2"

- name: Create Alert Manager Config
  kubernetes.core.k8s:
    state: present
    namespace: monitoring
    definition: "{{ lookup('file', 'files/alertmanagerconfig.yaml') | from_yaml }}"

- name: Create Discord Webhook URL Secret
  kubernetes.core.k8s:
    state: present
    namespace: monitoring
    definition: "{{ lookup('community.sops.sops', 'files/secret-discord-webhook-url.sops.yaml') | from_yaml }}"

- name: Deploy Metrics Server
  ansible.builtin.include_role:
    name: helm
    tasks_from: deploy
  vars:
    helm_chart_name: metrics-server
    helm_chart_ref: metrics-server/metrics-server
    helm_chart_version: "{{ metrics_server_version }}"
    helm_chart_namespace: kube-system
    helm_chart_values_template: "{{ core_role_path }}/templates/values/metrics-server.yaml.j2"
