---
- name: "Check for template values for {{ chart_name }}"
  delegate_to: localhost
  ansible.builtin.stat:
    path: "roles/workloads/templates/values/{{ chart_name }}.yaml.j2"
  register: workloads_template_values_file

- name: "Check for sops values for {{ chart_name }}"
  delegate_to: localhost
  ansible.builtin.stat:
    path: "roles/workloads/files/{{ chart_name }}.sops.yaml"
  register: workloads_sops_values_file

- name: "Deploy {{ chart_name }}"
  ansible.builtin.shell: |
    helm upgrade --install {{ chart_name }} {{ chart_ref }} \
      --namespace {{ workload_namespace }} \
      --create-namespace \
      --wait \
      --atomic \
      --cleanup-on-fail \
      --history-max 5 \
      {% if chart_version != 'latest' %}
      --version {{ chart_version }} \
      {% endif %}
      {% if workloads_template_values_file.stat.exists %}
      --values <(cat <<'EOF'
    {{ lookup('template', 'templates/values/' + chart_name + '.yaml.j2') }}
    EOF
      ) \
      {% endif %}
      {% if workloads_sops_values_file.stat.exists %}
      --values <(cat <<'EOF'
    {{ lookup('community.sops.sops', 'files/' + chart_name + '.sops.yaml') }}
    EOF
      ) \
      {% endif %}
      --timeout 5m
  args:
    executable: /bin/bash
  changed_when: true
