---
- name: Install Helm
  become: true
  community.general.snap:
    name: helm
    classic: true
    channel: latest/edge  # needed because helm 4 breaks things

- name: Check if Helm Diff is installed
  ansible.builtin.command: helm plugin list
  register: helm_plugins
  changed_when: false

- name: Install Helm Diff
  ansible.builtin.command: helm plugin install https://github.com/databus23/helm-diff
  when: "'diff' not in helm_plugins.stdout"
  changed_when: true

- name: Add Helm Repos
  ansible.builtin.command: >
    helm repo add {{ item.key }} {{ item.value }}
  loop: "{{ helm_repos | default({}) | dict2items }}"
  changed_when: true

- name: Update Helm Repos
  ansible.builtin.command: helm repo update
  changed_when: true
  when: helm_repos | default({}) | length > 0
