---
- name: Check if Pi-hole is installed
  ansible.builtin.stat:
    path: /usr/local/bin/pihole
  register: pihole_bin

- name: Create pihole config directory
  ansible.builtin.file:
    path: /etc/pihole
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Template pihole configuration
  ansible.builtin.template:
    src: pihole.toml.j2
    dest: /etc/pihole/pihole.toml
    owner: root
    group: root
    mode: '0644'
  notify: Restart pihole

- name: Download Pi-hole installer
  ansible.builtin.get_url:
    url: https://install.pi-hole.net
    dest: /tmp/pihole-install.sh
    mode: '0755'
  when: not pihole_bin.stat.exists

- name: Install Pi-hole unattended
  ansible.builtin.command: bash /tmp/pihole-install.sh --unattended
  when: not pihole_bin.stat.exists
  changed_when: true

- name: Ensure pihole-FTL is started
  ansible.builtin.systemd:
    name: pihole-FTL
    enabled: true
    state: started
