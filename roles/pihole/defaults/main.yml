---
# Values are strings because pihole-FTL --config expects literal CLI arguments
pihole_config:
  dns.upstreams: '["127.0.0.1#5335"]'
  dns.hosts: '["192.168.15.30 pollux.lan", "192.168.15.20 soteria.lan", "192.168.15.1 openwrt.lan", "192.168.15.60 poseidon.lan", "192.168.15.40 kube.poseidon.lan", "192.168.15.41 node1-poseidon.lan", "192.168.15.42 node2-poseidon.lan", "192.168.15.43 node3-poseidon.lan", "192.168.15.50 demeter.lan", "192.168.15.70 castor.lan"]'
  dns.cnameRecords: '["prometheus.soteria.lan,soteria.lan", "alertmanager.poseidon.lan,poseidon.lan", "prometheus.poseidon.lan,poseidon.lan", "longhorn.poseidon.lan,poseidon.lan", "grafana.soteria.lan,soteria.lan"]'
  dns.domainNeeded: "true"
  dns.interface: "eth0"
  dns.domain.name: "lan"
  misc.dnsmasq_lines: '["local-ttl=300"]'
  webserver.interface.boxed: "false"

pihole_groups:
  - name: Exempt

pihole_clients:
  - client: "80:E4:BA:34:6F:A7"
    comment: Liliana Work Laptop
    groups:
      - Exempt

pihole_adlists:
  - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
  - http://sysctl.org/cameleon/hosts
  - https://adaway.org/hosts.txt
  - https://v.firebog.net/hosts/AdguardDNS.txt
  - https://raw.githubusercontent.com/anudeepND/blacklist/master/adservers.txt
  - https://v.firebog.net/hosts/Easylist.txt
  - https://pgl.yoyo.org/adservers/serverlist.php?hostformat=hosts&showintro=0&mimetype=plaintext
  - https://raw.githubusercontent.com/FadeMind/hosts.extras/master/UncheckyAds/hosts
  - https://raw.githubusercontent.com/bigdargon/hostsVN/master/hosts
  - https://v.firebog.net/hosts/static/w3kbl.txt
  - https://v.firebog.net/hosts/Admiral.txt
  - https://v.firebog.net/hosts/Easyprivacy.txt
  - https://v.firebog.net/hosts/Prigent-Ads.txt
  - https://v.firebog.net/hosts/Prigent-Crypto.txt
  - https://www.github.developerdan.com/hosts/lists/ads-and-tracking-extended.txt
  - https://big.oisd.nl

pihole_domains:
  deny_exact:
    - domain: track-east.mobileadtrading.com
      comment: Migrated from blacklist
    - domain: api.fing.io
      comment: Migrated from blacklist
    - domain: telemetry.deeparc.net
      comment: Added from Query Log
  deny_regex:
    - domain: "(\\.|^)online-metrix\\.net$"
      comment: Port Scanner
    - domain: "(\\.|^)clickfunnels\\.com$"
      comment: ""
    - domain: "(\\.|^)adserver\\.snapads\\.com$"
      comment: Snapchat Ads
  allow_exact:
    - domain: dbl.oisd.nl
      comment: Migrated from whitelist
    - domain: fonts.gstatic.com
      comment: Google Fonts
    - domain: wo.vzwwo.com
      comment: Verizon Wifi Calling
    - domain: events.bsky.app
      comment: Bluesky Loading
  allow_regex:
    - domain: "(\\.|^)wix\\.com$"
      comment: Wix
    - domain: "(\\.|^)intuit\\.com$"
      comment: Intuit (TurboTax, CreditKarma, Mint)
